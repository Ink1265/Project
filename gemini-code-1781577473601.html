<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบควบคุมและดูรายชื่อผู้เข้าเรียน</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f6f9; padding: 20px; }
        .admin-box { background: white; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #1a73e8; color: white; }
        .btn-clear { background: #d93025; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .btn-back { background: #5f6368; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-bottom: 15px;}
    </style>
</head>
<body>

<div class="admin-box">
    <a href="index.html" class="btn-back">⬅️ กลับหน้าสแกน</a>
    <h2>📊 หน้าควบคุม: รายชื่อนักเรียนที่เข้าเรียน</h2>
    <button class="btn-clear" onclick="clearData()">🧹 ล้างข้อมูลทั้งหมด</button>

    <table>
        <thead>
            <tr>
                <th>ลำดับ</th>
                <th>รหัสนักเรียน (สุ่มจำลอง)</th>
                <th>เวลาที่เช็คอิน</th>
            </tr>
        </thead>
        <tbody id="log-table">
            <!-- ข้อมูลจะถูกดึงมาแสดงที่นี่ -->
        </tbody>
    </table>
</div>

<script>
    function loadLogs() {
        const tableBody = document.getElementById('log-table');
        const history = JSON.parse(localStorage.getItem('attendance')) || [];
        
        tableBody.innerHTML = '';
        
        if(history.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="3" style="text-align:center;">ยังไม่มีนักเรียนสแกนเข้าเรียน</td></tr>`;
            return;
        }

        history.forEach((item, index) => {
            let row = `<tr>
                <td>${index + 1}</td>
                <td>${item.id}</td>
                <td>${item.time}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    }

    function clearData() {
        if(confirm("คุณแน่ใจใช่ไหมที่จะลบข้อมูลการเข้าเรียนทั้งหมด?")) {
            localStorage.removeItem('attendance');
            loadLogs();
        }
    }

    // โหลดข้อมูลเมื่อเปิดหน้า
    loadLogs();
</script>

</body>
</html>
